name: Release Go CLI

# Tag scheme:
#   v0.1.1, v0.2.0 ...     → Go CLI release  (this workflow, plain semver for goreleaser)
#   py-v0.1.1, py-v0.2.0 ... → Python CLI release (release-python-cli.yml)
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: ./cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
