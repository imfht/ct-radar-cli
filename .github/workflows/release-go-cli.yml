name: Release Go CLI

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
          workdir: ./cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 锁定 goreleaser 的 tag 解析。否则它走 git describe 选字典序最大的 tag,
          # 同 commit 上有 pycli-v0.1.0 时会爆 "failed to parse tag as semver"。
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
